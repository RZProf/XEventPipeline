name: Generate Cross-Platform Standalone Releases

on:
  push:
    tags:
      - 'v*' # Triggers whenever you push a version tag (e.g., v1.0.0)

jobs:
  build-and-release:
    name: Build ${{ matrix.rid }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: windows-latest
            rid: win-x64
            output_name: XEPipeline-windows-x64.exe
          - os: ubuntu-latest
            rid: linux-x64
            output_name: XEPipeline-linux-x64
          - os: macos-latest
            rid: osx-x64
            output_name: XEPipeline-macos-intel
          - os: macos-latest
            rid: osx-arm64
            output_name: XEPipeline-macos-arm64

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Setup .NET 10 SDK
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '10.0.x'

    - name: Publish Single-File Binary
      run: |
        dotnet publish -c Release -r ${{ matrix.rid }} --self-contained true /p:PublishSingleFile=true /p:CopyOutputSymbolsToPublishDirectory=false -o ./publish

    - name: Rename Asset (Windows)
      if: matrix.os == 'windows-latest'
      run: Move-Item -Path ./publish/*.exe -Destination ./${{ matrix.output_name }}
      shell: pwsh

    - name: Rename Asset (Linux / macOS)
      if: matrix.os != 'windows-latest'
      run: |
        # Finds the compiled executable file and renames it cleanly
        find ./publish -maxdepth 1 -type f ! -name "*.*" -exec mv {} ./${{ matrix.output_name }} \;
      shell: bash

    - name: Upload to GitHub Release
      uses: softprops/action-gh-release@v2
      with:
        files: ${{ matrix.output_name }}
        generate_release_notes: true
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
